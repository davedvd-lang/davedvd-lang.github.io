name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Capacitor 8 exige Node >= 22
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # AGP 9 / Gradle 9 van sobre JDK 21
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # BUTACA_TMDB_KEY integra la clave en el bundle para que la app funcione
      # sin que el usuario tenga que configurar nada. Solo afecta a www/ (el AAB),
      # no al index.html que se publica en GitHub Pages.
      - name: Instalar dependencias y compilar web + Android
        env:
          BUTACA_TMDB_KEY: ${{ secrets.BUTACA_TMDB_KEY }}
        run: |
          npm install
          npm run android

      - name: Fijar versionCode automatico
        run: sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" android/app/build.gradle

      - name: Decodificar keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Dar permisos a gradlew
        run: chmod +x android/gradlew

      - name: Compilar AAB firmado
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Borrar keystore del runner
        if: always()
        run: rm -f android/app/release.keystore

      - name: Subir AAB como artefacto de la build
        uses: actions/upload-artifact@v4
        with:
          name: butaca-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Publicar como GitHub Release descargable
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Butaca build ${{ github.run_number }}
          files: android/app/build/outputs/bundle/release/app-release.aab
